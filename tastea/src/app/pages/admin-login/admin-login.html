<!-- Login Page with Banner Background -->
<section class="relative min-h-screen flex items-center justify-center px-4 overflow-hidden">
  <!-- Background Image -->
  <div class="absolute inset-0 admin-banner-bg"></div>
  <!-- Dark Overlay -->
  <div class="absolute inset-0 bg-gradient-to-br from-accent-900/85 via-accent-800/80 to-accent-900/85"></div>

  <div class="relative w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a routerLink="/" class="inline-block">
        <div class="w-20 h-20 rounded-full border-3 border-white/40 flex items-center justify-center mx-auto mb-4 bg-white/10 backdrop-blur-sm relative">
          <span class="text-4xl font-heading text-white">T</span>
          <span class="text-secondary-300 text-lg absolute top-1 right-2">🌱</span>
        </div>
      </a>
      <h1 class="text-3xl font-heading text-white mb-1">Tastea Admin</h1>
      <p class="text-white/50 text-sm">Sign in to manage orders</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      @if (error()) {
        <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-xl text-sm text-center">
          {{ error() }}
        </div>
      }

      <form (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
        <div>
          <label for="username" class="block text-sm font-medium text-accent-700 mb-1">Username</label>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            required
            autocomplete="username"
            class="w-full px-4 py-3 rounded-xl border border-accent-200 focus:ring-2 focus:ring-primary-300 focus:border-primary-400 outline-none transition-all"
            placeholder="Enter username"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-accent-700 mb-1">Password</label>
          <div class="relative">
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              [(ngModel)]="password"
              name="password"
              required
              autocomplete="current-password"
              class="w-full px-4 py-3 pr-12 rounded-xl border border-accent-200 focus:ring-2 focus:ring-primary-300 focus:border-primary-400 outline-none transition-all"
              placeholder="Enter password"
            />
            <button
              type="button"
              (click)="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-accent-400 hover:text-accent-600 transition-colors p-1"
              [attr.aria-label]="showPassword() ? 'Hide password' : 'Show password'">
              @if (showPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12c1.292 4.338 5.31 7.5 10.066 7.5.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
              }
            </button>
          </div>
        </div>

        <button
          type="submit"
          [disabled]="loading() || !username || !password"
          class="w-full py-3 bg-accent-800 text-white rounded-xl font-semibold hover:bg-accent-900 transition-colors disabled:opacity-50 disabled:cursor-not-allowed mt-1"
        >
          @if (loading()) {
            Signing in...
          } @else {
            Sign In
          }
        </button>
      </form>

      <div class="mt-6 text-center">
        <a routerLink="/" class="text-sm text-primary-500 hover:text-primary-600 font-medium">
          ← Back to store
        </a>
      </div>
    </div>
  </div>
</section>
