<div class="bg-white rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 overflow-hidden group border border-accent-100 flex flex-col h-full">
  <!-- Image / Emoji Area -->
  <div class="bg-gradient-to-br from-primary-50 to-secondary-50 p-6 text-center">
    <span class="text-5xl group-hover:scale-110 transition-transform duration-300 inline-block">
      {{ item().image }}
    </span>
  </div>

  <!-- Content -->
  <div class="p-5 flex flex-col flex-1">
    <div class="flex items-start justify-between gap-2 mb-2">
      <h3 class="text-lg font-heading text-accent-900">{{ item().name }}</h3>
      <span class="text-lg font-bold text-primary-600 whitespace-nowrap">
        {{ '$' + item().price.toFixed(2) }}
      </span>
    </div>

    <p class="text-sm text-accent-600 leading-relaxed mb-3 flex-1">{{ item().description }}</p>

    <!-- Tags -->
    @if (item().tags.length > 0) {
      <div class="flex flex-wrap gap-1.5 mb-4">
        @for (tag of item().tags; track tag) {
          <span class="text-xs px-2 py-0.5 rounded-full bg-secondary-100 text-secondary-700 font-medium">
            {{ tag }}
          </span>
        }
      </div>
    }

    <!-- Add to Cart Button -->
    <button
      (click)="onAddToCart()"
      class="w-full py-2.5 rounded-xl font-semibold text-sm transition-all duration-200"
      [class]="added()
        ? 'bg-secondary-500 text-white'
        : 'bg-primary-400 text-white hover:bg-primary-500 active:scale-95'"
    >
      @if (added()) {
        ✓ Added!
      } @else {
        Add to Cart
      }
    </button>
  </div>
</div>
