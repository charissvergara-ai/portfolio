<header class="header">
  <div class="container header-inner">
    <a routerLink="/" class="logo">
      <i class="fa-solid fa-tooth"></i>
      <span>Dentafy</span>
    </a>
    <nav class="nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/services" routerLinkActive="active">Services</a>
      <a routerLink="/about" routerLinkActive="active">About</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
    </nav>
    <div class="header-actions">
      @if (auth.user()) {
        <a [routerLink]="dashboardLink" class="btn btn-outline-primary btn-sm">
          <i class="fa-solid fa-grid-2"></i> Dashboard
        </a>
        <button class="btn btn-sm btn-ghost" (click)="auth.logout()">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      } @else {
        <a routerLink="/login" class="btn btn-outline-primary btn-sm">Login</a>
        <a routerLink="/book" class="btn btn-primary btn-sm">Book Appointment</a>
      }
    </div>
  </div>
</header>
